<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Bảng giá Hân Hưng</title>
<style>
  :root{
    --ink:#1c2127;
    --paper:#f6f4ee;
    --line:#dcd7c9;
    --accent:#b5502f;
    --accent-dim:#e7d9cd;
    --mono:#5a5446;
  }
  html{color-scheme: light only;}
  html{color-scheme: light only; background:#f6f4ee;}
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background-color:#f6f4ee !important;color:#1c2127 !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height:100%;
  }
  body{display:flex; flex-direction:column;}

  header{
    position:sticky; top:0; z-index:10;
    background-color:#f6f4ee !important;
    border-bottom:1px solid var(--line);
    padding:14px 16px 12px;
  }
  .brand{
    font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:#5a5446 !important; margin-bottom:8px; display:flex; justify-content:space-between;
  }
  .brand b{color:#1c2127 !important; font-weight:700;}

  .searchwrap{position:relative;}
  input#q{
    width:100%; padding:13px 40px 13px 14px; font-size:17px;
    border:1.5px solid var(--line); border-radius:10px;
    background-color:#ffffff !important; color:#1c2127 !important;
    outline:none;
  }
  input#q:focus{border-color:var(--accent);}
  .clearbtn{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:50%; border:none;
    background-color:#e7d9cd !important; color:#b5502f !important; font-size:16px;
    display:none; align-items:center; justify-content:center; cursor:pointer;
  }

  .filters{display:flex; gap:6px; margin-top:8px;}
  .filters button{
    flex:1; padding:7px 2px; font-size:12px; border-radius:8px;
    border:1.5px solid var(--line); background-color:#ffffff !important; color:#5a5446 !important;
    font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .filters button.active{background-color:#1c2127 !important; color:#ffffff !important; border-color:#1c2127;}

  .count{
    font-size:12px; color:#5a5446 !important; padding:10px 16px 4px;
  }

  main{flex:1; overflow-y:auto; padding-bottom:84px; background-color:#f6f4ee !important;}
  ul#results{list-style:none; margin:0; padding:0 12px;}
  li.row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:11px 8px; border-bottom:1px solid var(--line);
    background-color:#f6f4ee !important;
    flex-wrap:wrap;
  }
  li.row.fav{
    background-color:#fdf3d8 !important;
    border-left:3px solid #b5502f;
    padding-left:5px;
  }
  .name{flex:1 1 140px; min-width:0;}
  .name .t{font-size:14.5px; font-weight:600; line-height:1.28; color:#1c2127 !important;}
  li.row.fav .name .t{font-weight:800;}
  .name .meta{font-size:11px; color:#5a5446 !important; margin-top:1px;}
  .name mark{
    background-color:#f4d8a8 !important;
    color:#1c2127 !important;
    padding:0 1px; border-radius:2px;
  }

  .pricecards{
    display:flex; gap:4px; flex:0 0 auto; max-width:220px; margin-top:0;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
  }
  .pcard{
    flex:1; min-width:0; border-radius:7px; padding:4px 2px;
    text-align:center; cursor:pointer;
    border:1px solid var(--line);
    background-color:#ffffff !important;
  }
  .pcard:active{ transform:scale(0.97); }
  .pcard .lbl{font-size:8px; font-weight:600; color:#9a9486 !important; margin-bottom:1px; text-transform:uppercase; letter-spacing:.02em;}
  .pcard .val{font-size:13px; font-weight:800; line-height:1.1; white-space:nowrap;}
  .pcard .unit{display:none;}
  .pcard.raw{background-color:#f1efe8 !important;}
  .pcard.raw .val{color:#6b6557 !important;}
  .pcard.km{background-color:#e7f3ea !important; border-color:#bfe0c8;}
  .pcard.km .val{color:#1c7a4a !important;}
  .pcard.vat{background-color:#fdf3d8 !important; border-color:#e8d8a0;}
  .pcard.vat .val{color:#9a7416 !important;}
  .pcard.final{background-color:#fbe9e2 !important; border-color:#e8b8a4;}
  .pcard.final .val{color:#b5502f !important; font-size:13.5px;}

  /* Calculator overlay */
  .calc-backdrop{
    position:fixed; inset:0; background:rgba(28,33,39,0.55);
    z-index:100; display:none; align-items:flex-end; justify-content:center;
  }
  .calc-backdrop.show{display:flex;}
  .calc-sheet{
    background:#f6f4ee; width:100%; max-width:480px; border-radius:16px 16px 0 0;
    padding:18px 18px 28px; box-shadow:0 -4px 24px rgba(0,0,0,0.25);
    animation: calc-up 0.18s ease-out;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
  }
  @keyframes calc-up{ from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .calc-title{font-size:13px; color:#5a5446; margin-bottom:2px;}
  .calc-name{font-size:15px; font-weight:700; color:#1c2127; margin-bottom:14px; line-height:1.3;}
  .calc-display{
    background:#fff; border:1.5px solid #dcd7c9; border-radius:10px;
    padding:16px; text-align:right; font-size:32px; font-weight:700; color:#1c2127;
    margin-bottom:12px; overflow-x:auto; white-space:nowrap;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
  }
  .calc-expr{font-size:12px; color:#9a9486; text-align:right; margin-bottom:4px; min-height:14px;}
  .calc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .calc-grid button{
    padding:16px 0; font-size:18px; font-weight:600; border-radius:10px; border:none;
    background:#ffffff; color:#1c2127; cursor:pointer;
  }
  .calc-grid button.op{background:#e7d9cd; color:#b5502f;}
  .calc-grid button.eq{background:#1c2127; color:#fff;}
  .calc-grid button.clear{background:#f0a8a8; color:#7a1c1c;}
  .calc-close{
    margin-top:14px; width:100%; padding:12px 0; border-radius:10px; border:none;
    background:transparent; color:#5a5446; font-size:14px; font-weight:600;
  }

  .calc-fab{
    position:fixed; right:16px; bottom:22px; z-index:90;
    width:56px; height:56px; border-radius:50%; border:none;
    background-color:#1c2127 !important; color:#fff !important;
    font-size:24px; box-shadow:0 3px 10px rgba(0,0,0,0.3);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .calc-fab:active{ transform:scale(0.94); }

  .empty{
    text-align:center; padding:60px 20px; color:#5a5446 !important;
  }
  .empty .big{font-size:34px; margin-bottom:8px;}

  footer{
    padding:8px 16px 14px; font-size:11px; color:#5a5446 !important; text-align:center;
    border-top:1px solid var(--line); background-color:#f6f4ee !important;
  }
</style>
</head>

<header>
  <div class="brand"><span>CÔNG TY TNHH TM DV HÂN HƯNG</span><b>uPVC</b></div>

</header>

<div class="count" id="count"></div>
<main>
  <ul id="results"></ul>
  <div class="empty" id="empty" style="display:none">

</main>

<footer>863 mục · Giá đã/chưa chiết khấu (đồng) · Cập nhật 18.05.2026</footer>

<button class="calc-fab" id="calcFab" aria-label="Mở máy tính">🧮</button>

<div class="calc-backdrop" id="calcBackdrop">

      <button class="op" data-k="del">⌫</button>
      <button class="op" data-k="%">%</button>
      <button class="op" data-k="/">÷</button>
      <button data-k="7">7</button>
      <button data-k="8">8</button>
      <button data-k="9">9</button>
      <button class="op" data-k="*">×</button>
      <button data-k="4">4</button>
      <button data-k="5">5</button>
      <button data-k="6">6</button>
      <button class="op" data-k="-">−</button>
      <button data-k="1">1</button>
      <button data-k="2">2</button>
      <button data-k="3">3</button>
      <button class="op" data-k="+">+</button>
      <button data-k="0" style="grid-column: span 2;">0</button>
      <button data-k=".">.</button>
      <button class="eq" data-k="=">=</button>
    </div>
    <button class="calc-close" id="calcCloseBtn">Đóng</button>
  </div>
</div>

const qInput = document.getElementById('q');
const resultsEl = document.getElementById('results');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
const clearBtn = document.getElementById('clearBtn');
const filterBtns = document.querySelectorAll('.filters button');

let activeFilter = 'all';

function normalize(s){
  return s.toLowerCase()
    .replace(/đ/g,'d')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

const dataNorm = DATA.map(d => ({...d, _norm: normalize(d.ten) + ' ' + d.stt}));

function fmt(n){ return n.toLocaleString('vi-VN'); }

function highlight(text, terms){
  if(!terms.length) return text;
  let out = text;
  terms.forEach(t=>{
    if(!t) return;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out = out.replace(re, '<mark>$1</mark>');
  });
  return out;
}

function render(){
  const raw = qInput.value.trim();
  clearBtn.style.display = raw ? 'flex' : 'none';
  const norm = normalize(raw);
  const terms = norm.split(/\s+/).filter(Boolean);

  let list = dataNorm;
  if(activeFilter !== 'all') list = list.filter(d => d.loai === activeFilter);
  if(terms.length){
    list = list.filter(d => terms.every(t => d._norm.includes(t)));
  }

  countEl.textContent = list.length + ' kết quả';
  resultsEl.innerHTML = '';

  if(list.length === 0){
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  const frag = document.createDocumentFragment();
  list.slice(0, 200).forEach(d=>{
    const li = document.createElement('li');
    li.className = 'row' + (d.fav ? ' fav' : '');
    const nameHtml = raw ? highlight(d.ten, raw.split(/\s+/)) : d.ten;
    const star = d.fav ? '⭐ ' : '';
    const unitLabel = d.dvt.toLowerCase();
    const safeName = d.ten.replace(/"/g,'&quot;');
    const rawLabel = (typeof d.covat === 'number') ? 'Chưa VAT' : 'Chưa CK';

    const rawCard = `
      <div class="pcard raw" data-price="${d.giack}" data-name="${safeName}">
        <div class="lbl">${rawLabel}</div>
        <div class="val">${fmt(d.giack)}</div>
        <div class="unit">đ/${unitLabel}</div>
      </div>`;
    const kmCard = (typeof d.km === 'number') ? `
      <div class="pcard km" data-price="${d.km}" data-name="${safeName}">
        <div class="lbl">KM</div>
        <div class="val">${fmt(d.km)}</div>
        <div class="unit">đ/${unitLabel}</div>
      </div>` : '';
    const vatCard = (typeof d.covat === 'number') ? `
      <div class="pcard vat" data-price="${d.covat}" data-name="${safeName}">
        <div class="lbl">Có VAT</div>
        <div class="val">${fmt(d.covat)}</div>
        <div class="unit">đ/${unitLabel}</div>
      </div>` : '';
    const finalCard = `
      <div class="pcard final" data-price="${d.gia}" data-name="${safeName}">
        <div class="lbl">Đã CK</div>
        <div class="val">${fmt(d.gia)}</div>
        <div class="unit">đ/${unitLabel}</div>
      </div>`;

    li.innerHTML = `
      <div class="name">
        <div class="t">${star}${nameHtml}</div>
        <div class="meta">STT ${d.stt} · ${d.dvt}</div>
      </div>
      <div class="pricecards">${rawCard}${kmCard}${vatCard}${finalCard}</div>
    `;
    frag.appendChild(li);
  });
  resultsEl.appendChild(frag);
}

qInput.addEventListener('input', render);
clearBtn.addEventListener('click', ()=>{ qInput.value=''; render(); qInput.focus(); });

filterBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    filterBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    render();
  });
});

render();

/* ===== Long-press to open calculator ===== */
const calcBackdrop = document.getElementById('calcBackdrop');
const calcDisplay = document.getElementById('calcDisplay');
const calcExpr = document.getElementById('calcExpr');
const calcName = document.getElementById('calcName');
const calcCloseBtn = document.getElementById('calcCloseBtn');

let pressTimer = null;
let calcValue = '0';
let calcFullExpr = '';
let justEvaluated = false;
let pendingValue = undefined;
let pendingOp = undefined;

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(12);
}

function openCalc(cardEl){
  const price = cardEl.dataset.price;
  const name = cardEl.dataset.name;
  const labelEl = cardEl.querySelector('.lbl');
  const tierLabel = labelEl ? labelEl.textContent : '';
  calcName.textContent = name + (tierLabel ? ' · ' + tierLabel : '');
  calcValue = price;
  calcFullExpr = '';
  justEvaluated = false;
  pendingValue = undefined;
  pendingOp = undefined;
  updateCalcDisplay();
  calcBackdrop.classList.add('show');
  vibrate();
}

function openCalcFree(){
  // Open without changing current calculator state/value
  if(!calcName.textContent){
    calcName.textContent = 'Máy tính';
  }
  updateCalcDisplay();
  calcBackdrop.classList.add('show');
  vibrate();
}

function closeCalc(){
  calcBackdrop.classList.remove('show');
}

function updateCalcDisplay(){
  let shown = calcValue;
  if(shown.length > 14) shown = parseFloat(shown).toLocaleString('vi-VN', {maximumFractionDigits:2});
  else if(!isNaN(parseFloat(shown)) && shown !== '' && !shown.endsWith('.')){
    const parts = shown.split('.');
    parts[0] = parseInt(parts[0]||'0', 10).toLocaleString('vi-VN');
    shown = parts.join(',');
  }
  calcDisplay.textContent = shown;
  calcExpr.textContent = calcFullExpr || '\u00a0';
}

(function setupLongPress(){
  let moved = false;
  let activeEl = null;

  const start = (e)=>{
    const cardEl = e.target.closest('.pcard');
    if(!cardEl) return;
    activeEl = cardEl;
    moved = false;
    pressTimer = setTimeout(()=>{ if(!moved && activeEl) openCalc(activeEl); }, 420);
  };
  const cancel = ()=>{ moved = true; clearTimeout(pressTimer); };

  resultsEl.addEventListener('touchstart', start, {passive:true});
  resultsEl.addEventListener('touchmove', cancel, {passive:true});
  resultsEl.addEventListener('touchend', ()=>clearTimeout(pressTimer));
  resultsEl.addEventListener('mousedown', start);
  resultsEl.addEventListener('mouseup', ()=>clearTimeout(pressTimer));
  resultsEl.addEventListener('mouseleave', ()=>clearTimeout(pressTimer));
  resultsEl.addEventListener('contextmenu', (e)=>{ if(e.target.closest('.pcard')) e.preventDefault(); });
})();

calcCloseBtn.addEventListener('click', closeCalc);
calcBackdrop.addEventListener('click', (e)=>{ if(e.target === calcBackdrop) closeCalc(); });

const calcFab = document.getElementById('calcFab');
calcFab.addEventListener('click', openCalcFree);

document.querySelectorAll('.calc-grid button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const k = btn.dataset.k;
    handleCalcKey(k);
  });
});

function handleCalcKey(k){
  if(k === 'C'){
    calcValue = '0'; calcFullExpr = ''; justEvaluated = false;
    pendingValue = undefined; pendingOp = undefined;
  } else if(k === 'del'){
    calcValue = calcValue.length > 1 ? calcValue.slice(0,-1) : '0';
  } else if(['+','-','*','/'].includes(k)){
    const opSymbol = {'+':'+','-':'−','*':'×','/':'÷'}[k];
    if(justEvaluated){
      calcFullExpr = calcValue + ' ' + opSymbol + ' ';
    } else {
      calcFullExpr = (calcFullExpr ? calcFullExpr : calcValue) + ' ' + opSymbol + ' ';
    }
    justEvaluated = false;
    pendingValue = calcValue;
    pendingOp = k;
    calcValue = '0';
  } else if(k === '%'){
    const current = parseFloat(calcValue || '0');
    if(pendingOp !== undefined && pendingValue !== undefined){
      // e.g. 100000 - 10% => 10% of 100000 = 10000
      const base = parseFloat(pendingValue);
      calcValue = String(base * current / 100);
    } else {
      // no pending operator: just convert to fraction (e.g. 50% => 0.5)
      calcValue = String(current / 100);
    }
  } else if(k === '='){
    if(pendingOp !== undefined && pendingValue !== undefined){
      const a = parseFloat(pendingValue);
      const b = parseFloat(calcValue);
      let result = 0;
      if(pendingOp === '+') result = a + b;
      else if(pendingOp === '-') result = a - b;
      else if(pendingOp === '*') result = a * b;
      else if(pendingOp === '/') result = b !== 0 ? a / b : 0;
      calcFullExpr = calcFullExpr + calcValue + ' =';
      calcValue = String(Math.round(result * 100) / 100);
      pendingOp = undefined; pendingValue = undefined;
      justEvaluated = true;
    }
  } else if(k === '.'){
    if(justEvaluated){ calcValue = '0.'; calcFullExpr = ''; justEvaluated = false; }
    else if(!calcValue.includes('.')) calcValue += '.';
  } else {
    // digit
    if(justEvaluated){ calcValue = k; calcFullExpr = ''; justEvaluated = false; }
    else if(calcValue === '0') calcValue = k;
    else calcValue += k;
  }
  updateCalcDisplay();
}
</script>
