<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; word-wrap: break-word; }
  html, body { overflow-x: hidden; width: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #e9e4d8;
    color: #1c2f4a;
    max-width: 100vw;
  }
  button, input, select { font-family: inherit; max-width: 100%; }
  /* Safari iOS tự động zoom cả trang khi focus vào input có font-size < 16px.
     Ép tối thiểu 16px để chặn hành vi zoom tự động này. */
  input, select, textarea { font-size: 16px !important; }

  /* ---------- Header ---------- */
  header {
    background: #1c2f4a;
    color: #f3ead9;
    padding: 12px 12px 0 12px;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden;
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; padding:0 4px; }
  .brand { min-width:0; flex:1; overflow:hidden; }
  .brand h1 { font-size:18px; font-weight:700; letter-spacing:.02em; margin:0; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brand p { font-size:11px; color:#c7b896; margin:2px 0 0; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-items {
    display:flex; align-items:center; gap:6px; flex-shrink:0;
    background:#2e4566; color:#f3ead9; border:none;
    border-radius:999px; padding:9px 14px; font-size:12px; font-weight:600;
  }
  .btn-items:active { background:#3a5478; transform: scale(.96); }
  .btn-customers { padding:9px 12px; }

  .tab-hint { font-size:11px; color:#c7b896; padding:0 4px 4px; }

  .backup-reminder {
    background:#fff3cd; color:#7a5c00; padding:10px 14px; font-size:12.5px;
    display:flex; flex-direction:column; gap:8px; border-bottom:1px solid #e0c060;
  }
  .backup-reminder-actions { display:flex; gap:8px; }
  .backup-reminder-actions button {
    border:none; border-radius:999px; padding:7px 14px; font-size:12px; font-weight:700;
  }
  .backup-reminder-actions button:first-child { background:#1c2f4a; color:#f3ead9; }
  .backup-reminder-actions button:last-child { background:rgba(0,0,0,.08); color:#7a5c00; }
  .tab-hint b { color:#f3ead9; }

  .tabs { display:flex; gap:4px; overflow-x:auto; padding:0 4px 8px; scrollbar-width:thin; }
  .tabs::-webkit-scrollbar { height:4px; }
  .tabs::-webkit-scrollbar-thumb { background:#c7b896; border-radius:2px; }
  .tab {
    display:flex; align-items:center; gap:6px; flex-shrink:0;
    border-radius:8px 8px 0 0; padding:9px 12px; font-size:14px; font-weight:600;
    border:none; background:#2e4566; color:#c7b896; white-space:nowrap;
  }
  .tab.active { background:#e9e4d8; color:#1c2f4a; }
  .tab .close { opacity:.6; border-radius:50%; padding:2px; display:flex; }
  .tab .close:active { background:rgba(0,0,0,.15); }
  .tab-add {
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    width:36px; border-radius:8px 8px 0 0; background:#2e4566; color:#f3ead9; border:none;
  }
  .tab-add:active { background:#3a5478; }

  /* ---------- Kéo-thả đổi vị trí tab ---------- */
  .tab-drag-source { opacity:.35; }
  .tab-dragging-ghost {
    position:fixed; z-index:50; pointer-events:none;
    display:flex; align-items:center; gap:6px;
    border-radius:8px 8px 0 0; padding:9px 12px; font-size:14px; font-weight:600;
    background:#3a5478; color:#fff; white-space:nowrap;
    box-shadow:0 8px 20px rgba(0,0,0,.3); transform:scale(1.05);
  }
  body.tab-dragging-active { cursor:grabbing; }
  body.tab-dragging-active .tab { transition: transform .15s ease; }

  /* ---------- Sheet ---------- */
  main { padding:16px 12px; max-width:100vw; overflow-x:hidden; }
  .sheet {
    width:100%; max-width:640px; margin:0 auto;
    background:#fdfbf5; border:1px solid #d8cfb8; border-radius:12px;
    overflow-x:hidden; box-shadow:0 4px 16px rgba(0,0,0,.08);
  }
  .sheet-title {
    text-align:center; padding:16px 16px 12px;
    border-bottom:2px solid rgba(28,47,74,.2);
  }
  .sheet-title h2 { margin:0; font-size:20px; font-weight:700; letter-spacing:.02em; color:#1c2f4a; }

  .meta { padding:12px 16px 8px; display:flex; flex-direction:column; gap:8px; }
  .meta-row { display:flex; align-items:baseline; gap:8px; }
  .customer-row { align-items:flex-start; gap:8px; }

/* ============ LƯU / TẢI (localStorage) ============ */
function saveAll() {

    localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
    flashSavedNote();

}
// Lưu nhưng không vẽ lại "đã lưu lúc..." liên tục khi đang gõ (debounce nhẹ)
let _saveTimer = null;
function saveAllSilent() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tickets, activeId, rowIdSeq, ticketIdSeq, rollIdSeq }));
    localStorage.setItem(ITEMS_KEY, JSON.stringify(items));
  } catch (e) { console.error("Lưu thất bại", e); }

function updateLineTotalDisplay(ticketId, rowId) {
  const t = tickets.find(t => t.id === ticketId);
  const row = t.rows.find(r => r.id === rowId);
  const qty = rowQty(row);
  const lineTotal = roundMoney(qty * (Number(row.price) || 0));
  const el = document.getElementById("lineTotal_" + rowId);
  if (el) el.textContent = lineTotal > 0 ? formatNumber(lineTotal) + " đ" : "";
  const qtyLockedEl = document.getElementById("qtyLocked_" + rowId);
  if (qtyLockedEl) qtyLockedEl.textContent = formatNumber(qty) || "0";
  const qtyLabelEl = document.getElementById("qtyLabel_" + rowId);
  if (qtyLabelEl) qtyLabelEl.innerHTML = `Số lượng <span class="qty-label-roll-count">(${row.rolls.length} cuộn)</span>`;
  updateTargetRollsStatus(rowId, row);
  const warningEl = document.getElementById("priceWarning_" + rowId);
  if (warningEl) warningEl.innerHTML = buildPriceWarningHtml(row, qty);
}

function onTargetRollsInput(ticketId, rowId, value) {
  const t = tickets.find(t => t.id === ticketId);
  const row = t.rows.find(r => r.id === rowId);
  row.targetRolls = value;

}

function refreshGlobalRollsSummaryDisplay() {
  const globalEl = document.getElementById("globalRollsSummary");
  if (!globalEl) return;
  const html = buildGlobalRollsSummary();
  if (html) {
    globalEl.className = "global-rolls-summary";
    globalEl.style.display = "";
    globalEl.innerHTML = html;
  } else {
    globalEl.className = "";
    globalEl.style.display = "none";
    globalEl.innerHTML = "";
  }
}

function updateTargetRollsStatus(rowId, row) {
  const target = Number(row.targetRolls) || 0;
  const isExact = target > 0 && row.rolls.length === target;
  const isOver = target > 0 && row.rolls.length > target;
  const input = document.getElementById("targetRolls_" + rowId);
  if (input) {
    input.classList.toggle("exact", isExact);
    input.classList.toggle("over", isOver);
  }
}
// Bấm vào ô tích xanh để tắt/bật — dùng khi cần loại 1 dòng ống ra khỏi chiết khấu

// Tích/bỏ tích ô chiết khấu cho 1 dòng ống cụ thể, rồi cập nhật lại số tiền CK ngay.

  const row = t.rows.find(r => r.id === rowId);
  row.discountChecked = checked;
  saveAll();
  updateDiscountDisplay(ticketId);
  // Cập nhật lại bảng tổng hợp để cột ✓ hiện đúng ngay, không cần mở lại phiếu

function onDiscountPercentInput(ticketId, value) {
  const t = tickets.find(t => t.id === ticketId);
  t.discountPercent = value;
  saveAllSilent();
  updateDiscountDisplay(ticketId);
}

function updateDiscountDisplay(ticketId) {
  const t = tickets.find(t => t.id === ticketId);
  if (!t) return;
  const total = t.rows.reduce((sum, r) => sum + roundMoney(rowQty(r) * (Number(r.price) || 0)), 0);
  const discountBaseAmount = t.rows.reduce((sum, r) => {
    if (!r.discountChecked) return sum;
    return sum + roundMoney(rowQty(r) * (Number(r.price) || 0));
  }, 0);
  const discountPercent = Number(t.discountPercent) || 0;
  const discountAmount = roundMoney(discountBaseAmount * discountPercent / 100);
  const finalTotal = total - discountAmount;

  const amountEl = document.getElementById("discountAmount_" + ticketId);
  if (amountEl) amountEl.textContent = discountAmount > 0 ? "-" + formatNumber(discountAmount) + " đ" : "0 đ";
  const finalEl = document.getElementById("finalTotal_" + ticketId);
  if (finalEl) finalEl.textContent = formatNumber(finalTotal) + " đ";

  // Cập nhật tổng cộng = thành tiền sau CK + nợ cũ
  const oldDebt = parseNumber(t.oldDebt) || 0;
  const grandTotal = finalTotal + oldDebt;
  const grandEl = document.getElementById("grandTotalWithDebt_" + ticketId);
  if (grandEl) grandEl.textContent = formatNumber(grandTotal) + " đ";
}

function onOldDebtInput(ticketId, el) {
  const caretFromEnd = el.value.length - el.selectionStart;
  const num = parseNumber(el.value);
  const t = tickets.find(t => t.id === ticketId);
  if (t) t.oldDebt = num;
  saveAllSilent();
  const formatted = formatNumber(num);
  el.value = formatted === "" ? "" : formatted;
  if (formatted !== "") {
    const newPos = Math.max(0, formatted.length - caretFromEnd);
    el.setSelectionRange(newPos, newPos);
  }
  updateDiscountDisplay(ticketId);
}

function updateGrandTotalDisplay(ticketId) {
  const t = tickets.find(t => t.id === ticketId);
  const total = t.rows.reduce((sum, r) => sum + roundMoney(rowQty(r) * (Number(r.price) || 0)), 0);
  const el = document.getElementById("grandTotal");
  if (el) el.textContent = formatNumber(total) + " đ";
  updateDiscountDisplay(ticketId);
  const summaryEl = document.getElementById("summaryLine");
  if (summaryEl) summaryEl.innerHTML = buildSummaryLine(t);
  const thicknessEl = document.getElementById("thicknessSummaryLine");
  if (thicknessEl) {
    const html = buildThicknessSummaryLine(t);
    if (html) {

      thicknessEl.style.display = "";
      thicknessEl.innerHTML = html;

      thicknessEl.innerHTML = "";

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      tickets = data.tickets || [];
      activeId = data.activeId || (tickets[0] && tickets[0].id);
      rowIdSeq = data.rowIdSeq || rowIdSeq;
      ticketIdSeq = data.ticketIdSeq || ticketIdSeq;
      rollIdSeq = data.rollIdSeq || rollIdSeq;
    }
    const rawItems = localStorage.getItem(ITEMS_KEY);
    items = rawItems ? JSON.parse(rawItems) : DEFAULT_ITEMS.map(i => ({...i}));
    const rawCustomers = localStorage.getItem(CUSTOMERS_KEY);
    savedCustomers = rawCustomers ? JSON.parse(rawCustomers) : [];
  } catch (e) {
    console.error("Tải dữ liệu thất bại, dùng mặc định", e);
    items = DEFAULT_ITEMS.map(i => ({...i}));
    savedCustomers = [];
  }
  if (!tickets || tickets.length === 0) {
    const t = newTicket();
    tickets = [t];
    activeId = t.id;
  }
}

/* ============ HELPERS ============ */
function formatNumber(n) {
  if (n === "" || n === null || n === undefined || isNaN(n)) return "";
  return Number(n).toLocaleString("vi-VN");
}
function parseNumber(str) {
  if (typeof str !== "string") return str;
  const clean = str.replace(/[^\d]/g, "");
  return clean === "" ? "" : Number(clean);
}
function parseWeight(str) {
  if (str === "" || str === null || str === undefined) return null;
  const clean = String(str).replace(",", ".").trim();
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}
function rollsTotal(rolls) {
  return rolls.reduce((sum, r) => sum + (Number(r.weight) || 0), 0);
}
function getActive() {
  return tickets.find(t => t.id === activeId) || tickets[0];
}
// Làm tròn thành tiền: 3 số cuối từ 500 trở lên thì làm tròn lên 1000,
// dưới 500 thì về 000. Ví dụ 22.378 -> 22.000, 22.500 -> 23.000.
function roundMoney(amount) {
  if (!amount) return amount;
  return Math.round(amount / 1000) * 1000;
}
function rowQty(row) {
  return row.mode === "rolls" ? rollsTotal(row.rolls) : (Number(row.qty) || 0);
}

// Cảnh báo nhỏ khi dòng đã có tên hàng + đã có số lượng, nhưng quên điền đơn giá
// (giá = 0) -> nhắc để không bị sót, tính tiền thiếu khi tổng hợp phiếu.
function buildPriceWarningHtml(row, qty) {
  const hasName = (row.name || "").trim() !== "";
  const hasQty = qty > 0;
  const hasPrice = (Number(row.price) || 0) > 0;
  if (hasName && hasQty && !hasPrice) {
    return `<div class="price-warning">⚠ Chưa điền đơn giá cho dòng này</div>`;
  }
  if (hasName && hasPrice && !hasQty) {
    return `<div class="price-warning">⚠ Đã có đơn giá nhưng chưa nhập số lượng</div>`;
  }
  return "";
}
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function updateTicketSilent(id, patch) {

  Object.assign(t, patch);
  saveAllSilent();
  if ("customer" in patch) {
    updateTabLabel(id);
    const summaryEl = document.getElementById("summaryLine");
    if (summaryEl) summaryEl.innerHTML = buildSummaryLine(t);

}
// Lưu tên khách vào danh bạ gợi ý (tránh trùng tên, không phân biệt hoa/thường khi so sánh)
function rememberCustomer(name) {
  const trimmed = (name || "").trim();
  if (!trimmed) return;
  const exists = savedCustomers.some(n => n.toLowerCase() === trimmed.toLowerCase());
  if (!exists) {
    savedCustomers.push(trimmed);
    savedCustomers.sort((a, b) => a.localeCompare(b, "vi"));
    try { localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(savedCustomers)); } catch (e) {}
  }
}

// Bấm nút "Lưu" cạnh ô khách hàng: chốt rõ ràng tên đang gõ vào danh bạ,
// để lần sau gõ chữ cái đầu là tên hiện ra ngay trong gợi ý.
function saveCustomerName(ticketId) {
  const t = tickets.find(t => t.id === ticketId);
  if (!t) return;
  const name = (t.customer || "").trim();
  if (!name) return;
  const alreadySaved = savedCustomers.some(n => n.toLowerCase() === name.toLowerCase());
  rememberCustomer(name);
  flashCustomerSaved(ticketId, alreadySaved);
}

function flashCustomerSaved(ticketId, alreadySaved) {
  const wrap = document.querySelector(`[data-customer-saved-note="${ticketId}"]`);
  // Hiện thông báo nhỏ ngay cạnh nút Lưu để biết chắc đã lưu thành công.
  const btn = document.querySelector(".customer-save-btn");
  if (btn) {
    const original = btn.textContent;
    btn.textContent = alreadySaved ? "Đã có" : "Đã lưu ✓";
    btn.classList.add("customer-save-btn-done");
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove("customer-save-btn-done");
    }, 1200);
  }
}

// Lọc danh bạ theo chữ đã gõ (không phân biệt hoa/thường, lọc theo phần chứa,
// để gõ chữ cái đầu là ra ngay tên đã lưu trước đó).
function buildCustomerPickerHtml(ticket) {
  if (!openCustomerPicker) return "";
  const query = (ticket.customer || "").trim().toLowerCase();
  let matches;
  if (query) {
    // Ưu tiên tên BẮT ĐẦU bằng đúng chữ đang gõ lên đầu danh sách,
    // tên chỉ chứa chữ đó ở giữa thì xếp sau, để gõ "T" ra ngay các tên
    // bắt đầu bằng T trước, không bị xáo trộn theo alphabet như cũ.
    const startsWith = savedCustomers.filter(n => n.toLowerCase().startsWith(query));
    const contains = savedCustomers.filter(n => !n.toLowerCase().startsWith(query) && n.toLowerCase().includes(query));
    matches = [...startsWith, ...contains];
  } else {
    matches = savedCustomers;
  }
  if (matches.length === 0) {
    if (savedCustomers.length === 0) return "";
    return `<div class="picker customer-picker"><div class="picker-empty">Không tìm thấy khách phù hợp</div></div>`;
  }
  const opts = matches.map(n =>
    `<button class="picker-item" onclick="pickCustomer(${ticket.id}, '${n.replace(/'/g, "\\'")}')">
      <span>${escapeHtml(n)}</span>
    </button>`
  ).join("");
  return `<div class="picker customer-picker">${opts}</div>`;
}

function expandQuery(raw) {
  const tokens = raw.trim().toLowerCase().split(/\s+/).filter(Boolean);
  return tokens.map(tok => SEARCH_ALIASES[tok] || tok).join(" ");
}

function buildItemPickerListHtml() {
  if (items.length === 0) {
    return `<div class="ipm-empty">Chưa có mặt hàng. Bấm "Mặt hàng" ở trang chính để thêm.</div>`;
  }

  // Chip "Yêu thích" đặc biệt
  if (itemPickerChip === "__star__") {
    const starred = items.filter(it => it.star === true);
    if (starred.length === 0) return `<div class="ipm-empty">Chưa có mặt hàng yêu thích. Bấm ⭐ để đánh dấu.</div>`;
    return starred.map(it => renderPickerItemRow(it)).join("");
  }

  // Kết hợp chip + gõ tay
  const chipQ = itemPickerChip ? expandQuery(itemPickerChip) : "";
  const typeQ = expandQuery(itemPickerQuery);
  const combined = [chipQ, typeQ].filter(Boolean).join(" ");

  if (combined) {
    const tokens = combined.split(/\s+/).filter(Boolean);
    const matches = items.filter(it => {
      const haystack = (it.name + " " + (it.group || "")).toLowerCase();
      return tokens.every(tok => haystack.includes(tok));
    });
    if (matches.length === 0) return `<div class="ipm-empty">Không tìm thấy mặt hàng phù hợp</div>`;
    // Nếu chỉ dùng chip (chưa gõ thêm): nhóm theo group cho gọn
    if (!typeQ) {
      const groups = [...new Set(matches.map(it => it.group || ""))];
      if (groups.length === 1) return matches.map(it => renderPickerItemRow(it)).join("");
      let html = "";
      groups.forEach(g => {
        const gItems = matches.filter(it => (it.group||"") === g);
        if (groups.length > 1 && g) html += `<div class="ipm-group-header" style="cursor:default">${escapeHtml(g)} <span class="group-count">${gItems.length}</span></div>`;
        gItems.forEach(it => { html += renderPickerItemRow(it); });
      });
      return html;
    }
    return matches.map(it => renderPickerItemRow(it)).join("");
  }

  // Chưa gõ gì: hiện mặt hàng không nhóm trực tiếp + các nhóm có thể mở rộng.
  const ungrouped = items.filter(it => !it.group);
  const groupNames = [...new Set(items.filter(it => it.group).map(it => it.group))];

  let html = "";
  ungrouped.forEach(it => { html += renderPickerItemRow(it); });

  groupNames.forEach(g => {
    const isOpen = openGroupName === g;
    const count = items.filter(it => it.group === g).length;
    html += `<button class="ipm-group-header" onclick="toggleGroup('${g.replace(/'/g, "\\'")}')">
      <span>📁 ${escapeHtml(g)}</span><span class="group-count">${count} ${isOpen ? "▲" : "▼"}</span>
    </button>`;
    if (isOpen) {
      items.filter(it => it.group === g).forEach(it => { html += renderPickerItemRow(it, true); });
    }
  });

  return html;
}

// Vẽ 1 dòng mặt hàng trong picker, kèm nút sao bấm được để đánh dấu/bỏ dấu
// mặt hàng hay dùng. Mặt hàng đã đánh dấu sao có nền vàng nổi bật để dễ nhận ra.
function renderPickerItemRow(it, isSub) {
  const originalIdx = items.indexOf(it);
  const starred = it.star === true;
  const groupTag = it.group ? `<span class="item-group-tag">${escapeHtml(it.group)}</span>` : "";
  const subCls = isSub ? " ipm-item-sub" : "";
  const starredCls = starred ? " ipm-item-starred" : "";
  return `<div class="ipm-item-row${subCls}${starredCls}">
    <button class="ipm-item" onclick="pickItemFromModal(${originalIdx})">
      <span>${starred ? "⭐ " : ""}${escapeHtml(it.name)}${groupTag}</span><span class="unit">${escapeHtml(it.unit)}</span>
    </button>
  </div>`;
}

function toggleGroup(groupName) {
  openGroupName = openGroupName === groupName ? null : groupName;
  renderItemPickerList();
}

function renderItemPickerList() {
  const el = document.getElementById("itemPickerModalList");
  if (el) el.innerHTML = buildItemPickerListHtml();
}

function buildCustomerPickerListHtml() {
  const query = customerPickerQuery.trim().toLowerCase();
  const matches = query
    ? savedCustomers.filter(n => n.toLowerCase().includes(query))
    : savedCustomers;

  let html = "";
  // Nếu đang gõ tên chưa có trong danh bạ, cho chọn ngay dùng tên mới đó
  // (khác với chọn tên hàng vì khách hàng là danh sách mở, không cố định).
  const trimmedQuery = customerPickerQuery.trim();
  const exactMatch = savedCustomers.some(n => n.toLowerCase() === trimmedQuery.toLowerCase());
  if (trimmedQuery && !exactMatch) {
    html += `<button class="ipm-item ipm-item-new" onclick="pickCustomerFromModal('${trimmedQuery.replace(/'/g, "\\'")}')">
      <span>+ Dùng tên "${escapeHtml(trimmedQuery)}"</span>
    </button>`;
  }

  if (matches.length === 0 && !trimmedQuery) {
    html += `<div class="ipm-empty">Chưa có khách hàng nào được lưu. Gõ tên ở trên để thêm khách mới.</div>`;
  } else if (matches.length === 0) {
    html += `<div class="ipm-empty">Không tìm thấy khách hàng phù hợp</div>`;
  } else {
    matches.forEach(n => {
      html += `<div class="ipm-item-row">
        <button class="ipm-item" onclick="pickCustomerFromModal('${n.replace(/'/g, "\\'")}')">
          <span>${escapeHtml(n)}</span>
        </button>
      </div>`;

  return html;
}

function updateRow(ticketId, rowId, patch) {
  const t = tickets.find(t => t.id === ticketId);
  const r = t.rows.find(r => r.id === rowId);
  Object.assign(r, patch);
  saveAll(); render();
}
// Dùng khi gõ số lượng/đơn giá/tên hàng: lưu + cập nhật số tiền hiển thị tại chỗ,
// không vẽ lại toàn bộ DOM nên không mất focus bàn phím.
function updateRowSilent(ticketId, rowId, patch) {
  const t = tickets.find(t => t.id === ticketId);
  const r = t.rows.find(r => r.id === rowId);
  Object.assign(r, patch);
  saveAllSilent();
  updateLineTotalDisplay(ticketId, rowId);
  updateGrandTotalDisplay(ticketId);
  resetHorizontalScroll();
}
// Khi gõ đơn giá: lưu số + tự hiện lại có dấu chấm ngăn nghìn ngay trong ô,
// đồng thời giữ đúng vị trí con trỏ (tính từ cuối chuỗi vì số luôn gõ thêm ở cuối).
function onPriceInput(ticketId, rowId, el) {
  const caretFromEnd = el.value.length - el.selectionStart;
  const num = parseNumber(el.value);
  updateRowSilent(ticketId, rowId, { price: num });
  const formatted = formatNumber(num);
  el.value = formatted;
  const newPos = Math.max(0, formatted.length - caretFromEnd);
  el.setSelectionRange(newPos, newPos);
}

// Gọi khi rời khỏi ô đơn giá (đã gõ xong hoàn chỉnh) -> mới xét tự điền
// giá cho các dòng cùng độ dày [..], tránh điền nhầm số dở giữa lúc đang gõ.
function onPriceBlur(ticketId, rowId) {
  applyThicknessPrice(ticketId, rowId);
}

// Tự điền đơn giá cho các dòng cùng độ dày [..] trong CÙNG phiếu.
// - Dòng đang trống/0 giá -> tự điền theo giá vừa gõ.
// - Dòng đã có giá khác -> không đè, chỉ cảnh báo cho anh biết để tự kiểm tra lại.
function applyThicknessPrice(ticketId, sourceRowId) {
  const t = tickets.find(t => t.id === ticketId);
  if (!t) return;
  const sourceRow = t.rows.find(r => r.id === sourceRowId);
  if (!sourceRow) return;
  const price = Number(sourceRow.price) || 0;
  if (price <= 0) return;
  const name = (sourceRow.name || "").trim();
  const m = name.match(/\[([^\]]+)\]/);
  if (!m) return;
  const thickness = m[1].trim();

  const conflicts = [];
  let filledCount = 0;
  const focusedInput = document.activeElement;

  t.rows.forEach(row => {
    if (row.id === sourceRowId) return;
    const rName = (row.name || "").trim();
    if (!rName) return;
    const rm = rName.match(/\[([^\]]+)\]/);
    if (!rm || rm[1].trim() !== thickness) return; // không cùng độ dày

    const rPrice = Number(row.price) || 0;
    if (rPrice <= 0) {
      // Nếu ô giá của dòng này đang được anh focus/gõ dở, không tự điền đè lên
      // (tránh trộn lẫn dữ liệu giữa giá tự điền và ký tự đang gõ).
      const targetInput = document.getElementById("priceInput_" + row.id);
      if (focusedInput && targetInput === focusedInput) return;
      // chưa có giá -> tự điền
      row.price = price;
      filledCount++;
    } else if (rPrice !== price) {
      // đã có giá khác -> không đè, ghi nhận để cảnh báo
      conflicts.push({ name: rName, price: rPrice });
    }
  });

  if (filledCount > 0) {
    saveAll();
    render();
  }

  if (conflicts.length > 0) {
    const lines = conflicts.map(c => `• ${c.name}: ${formatNumber(c.price)} đ (khác với ${formatNumber(price)} đ)`).join("\n");
    alert(`Giá [${thickness}] đang không khớp nhau trong phiếu này:\n${lines}\n\nAnh kiểm tra lại xem có nhập nhầm giá không nhé.`);
  }
}
function addRow(ticketId) {
  const t = tickets.find(t => t.id === ticketId);
  t.rows.push(newRow());
  saveAll(); render();
}

/* ============ HỘP THOẠI XÁC NHẬN TỰ VẼ ============
   Dùng thay cho confirm() của trình duyệt, vì confirm() có thể bị chặn
   âm thầm trên một số trình duyệt/khung xem di động (im lặng, không hiện
   gì, coi như luôn trả về false) — khiến các nút xoá tưởng như "không bấm
   được". Modal tự vẽ này luôn hiển thị chắc chắn, không phụ thuộc trình duyệt. */
function showConfirmDialog(message, onConfirm) {
  const root = document.getElementById("confirmModalRoot");
  if (!root) { onConfirm(); return; } // phòng hờ, vẫn cho xoá nếu thiếu root vì lý do gì
  root.innerHTML = `
    <div class="confirm-overlay">
      <div class="confirm-box">
        <p class="confirm-message">${escapeHtml(message)}</p>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-cancel" id="confirmCancelBtn">Huỷ</button>
          <button class="confirm-btn confirm-ok" id="confirmOkBtn">Xoá</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("confirmCancelBtn").onclick = () => { root.innerHTML = ""; };
  document.getElementById("confirmOkBtn").onclick = () => {
    root.innerHTML = "";
    onConfirm();
  };
}

function deleteRow(ticketId, rowId) {
  const t = tickets.find(t => t.id === ticketId);
  const row = t.rows.find(r => r.id === rowId);
  const name = row && row.name ? row.name.trim() : "";
  const label = name ? `dòng "${name}"` : "dòng hàng này";
  showConfirmDialog(`Xoá ${label}? Mọi số liệu đã nhập ở dòng này sẽ mất.`, () => {
    t.rows = t.rows.filter(r => r.id !== rowId);
    saveAll(); render();
  });
}
function addTicket() {
  const t = newTicket();
  tickets.push(t);
  activeId = t.id;
  saveAll(); render();
  setTimeout(() => {
    const el = document.getElementById("tabs");
    if (el) el.scrollLeft = el.scrollWidth;
  }, 0);
}
function closeTicket(id) {
  const t = tickets.find(t => t.id === id);
  const idx = tickets.findIndex(t => t.id === id);
  const label = t && t.customer && t.customer.trim() ? t.customer.trim() : `Phiếu ${idx + 1}`;
  showConfirmDialog(`Đóng phiếu "${label}"? Toàn bộ hàng hoá và số liệu đã nhập trong phiếu này sẽ mất.`, () => {
    tickets = tickets.filter(t => t.id !== id);
    if (tickets.length === 0) {
      const nt = newTicket();
      tickets = [nt];
      activeId = nt.id;
    } else if (id === activeId) {
      const nextIdx = Math.max(0, idx - 1);
      activeId = tickets[nextIdx].id;
    }
    saveAll(); render();
  });
}
function setActiveTicket(id) {
  activeId = id;
  saveAll(); render();
}
function pickItem(rowId, idx, ticketId) {
  const it = items[idx];
  openPickerRowId = null;
  const t = ticketId ? tickets.find(tk => tk.id === ticketId) : getActive();
  const row = t.rows.find(r => r.id === rowId);
  // Mặc định "Cộng nhiều cuộn" khi tên có dạng [..] (lưới) HOẶC mặt hàng được
  // đánh dấu riêng rolls:true (ví dụ Kẽm gai, dù không cần ghi độ dày trong tên).
  const isLuoi = /\[([^\]]+)\]/.test(it.name) || it.rolls === true;
  const nameChanged = row && row.name !== it.name;
  // Ô tích chọn chiết khấu chỉ hiện cho các nhóm ống/phụ kiện, KHÔNG hiện
  // cho nhóm "Lưới B40" hay "Đinh, kẽm" (dù 2 nhóm này cũng có group).
  const NO_DISCOUNT_GROUPS = ["Lưới B40", "Đinh, kẽm"];
  const isPipe = !!it.group && !NO_DISCOUNT_GROUPS.includes(it.group);
  const patch = { name: it.name, unit: it.unit, mode: isLuoi ? "rolls" : "simple", isPipe, tickEnabled: true, discountChecked: isPipe };
  if (nameChanged) {
    // Nếu mặt hàng có giá mặc định sẵn trong danh mục (ví dụ giá ống lấy từ
    // bảng giá nhà cung cấp), tự điền giá đó luôn; nếu không thì xoá giá cũ
    // vì giá cũ không còn đúng cho mặt hàng mới (như lưới/kẽm cần gõ tay).
    patch.price = (typeof it.price === "number" && it.price > 0) ? it.price : "";
  }
  updateRow(t.id, rowId, patch);
  // Nếu phiếu đã có dòng khác cùng độ dày [..] với giá > 0, tự điền giá đó
  // cho dòng vừa chọn tên hàng, để anh không phải gõ lại giá đã biết trước.
  fillPriceFromExisting(t.id, rowId);
}

// Dò trong phiếu xem đã có dòng nào cùng độ dày [..] có giá > 0 chưa,
// nếu có thì tự điền cho dòng đang trống giá này.
function fillPriceFromExisting(ticketId, rowId) {
  const t = tickets.find(t => t.id === ticketId);
  if (!t) return;
  const row = t.rows.find(r => r.id === rowId);
  if (!row) return;
  if ((Number(row.price) || 0) > 0) return; // dòng này đã có giá rồi, không đụng vào
  const name = (row.name || "").trim();
  const m = name.match(/\[([^\]]+)\]/);
  if (!m) return;
  const thickness = m[1].trim();

  const existing = t.rows.find(r => {
    if (r.id === rowId) return false;
    const rName = (r.name || "").trim();
    if (!rName) return false;
    const rm = rName.match(/\[([^\]]+)\]/);
    return rm && rm[1].trim() === thickness && (Number(r.price) || 0) > 0;
  });

  if (existing) {
    row.price = Number(existing.price);
    saveAll();
    render();
  }
}
function setMode(rowId, mode) {
  updateRow(getActive().id, rowId, { mode });
}

let _addingRoll = false;
function addRoll(ticketId, rowId, refocus) {
  if (_addingRoll) return; // chặn gọi trùng khi pointerdown và blur kích hoạt liên tiếp
  const t = tickets.find(t => t.id === ticketId);
  const row = t.rows.find(r => r.id === rowId);
  const w = parseWeight(row.rollInput);
  if (w === null || w <= 0) return;
  _addingRoll = true;
  row.rolls = [...row.rolls, { id: rollIdSeq++, weight: w }];
  row.rollInput = "";
  saveAll(); render();
  // Chỉ tự focus lại khi gọi từ Enter/nút bấm (muốn gõ tiếp cuộn khác ngay).
  // Khi gọi từ onblur (rời ô để qua việc khác), không ép focus lại,
  // để không cản ý định chuyển sang chỗ khác của người dùng.
  if (refocus) focusRollInput(rowId);
  setTimeout(() => { _addingRoll = false; }, 100);
}

// Đặt con trỏ về cuối ô khi vừa bấm vào, để xoá/gõ thêm số ngay không cần
// tự kéo con trỏ qua phải. input[type=number] không hỗ trợ setSelectionRange
// trực tiếp trên một số trình duyệt, nên dùng cách an toàn: gán lại value
// của chính nó để trình duyệt tự đẩy con trỏ về cuối.
function moveCaretToEnd(el) {
  const v = el.value;
  el.value = "";
  el.value = v;
}

function focusRollInput(rowId) {
  // render() vừa tạo lại DOM nên phải đợi 1 nhịp rồi mới focus được ô mới
  requestAnimationFrame(() => {
    const el = document.getElementById("rollInput_" + rowId);
    if (el) el.focus();
  });
}

function removeRoll(ticketId, rowId, rollId) {
  const t = tickets.find(t => t.id === ticketId);
  const row = t.rows.find(r => r.id === rowId);
  const roll = row.rolls.find(r => r.id === rollId);
  const weightLabel = roll ? formatNumber(roll.weight) + " kg" : "cuộn này";
  showConfirmDialog(`Xoá cuộn ${weightLabel} đã cân?`, () => {
    row.rolls = row.rolls.filter(r => r.id !== rollId);
    saveAll(); render();
  });
}

/* ============ RENDER: TABS ============ */
function renderTabs() {
  const wrap = document.getElementById("tabs");
  let html = "";
  tickets.forEach((t, i) => {
    const label = t.customer && t.customer.trim() ? escapeHtml(t.customer.trim()) : ("Phiếu " + (i + 1));
    const activeCls = t.id === activeId ? " active" : "";
    html += `<button class="tab${activeCls}" data-ticket-id="${t.id}" onclick="setActiveTicket(${t.id})">
      <span id="tabLabel_${t.id}">${label}</span>`;
    if (tickets.length > 1) {
      html += `<span class="close" onclick="event.stopPropagation(); closeTicket(${t.id})">✕</span>`;
    }
    html += `</button>`;
  });
  html += `<button class="tab-add" onclick="addTicket()" aria-label="Thêm phiếu mới">+</button>`;
  wrap.innerHTML = html;
  attachTabDragHandlers();
}

/* ============ KÉO-THẢ ĐỔI VỊ TRÍ TAB (nhấn giữ rồi kéo) ============ */
let _dragState = null; // { tabEl, ticketId, startX, startY, longPressTimer, dragging, placeholderIndex }

function attachTabDragHandlers() {
  const wrap = document.getElementById("tabs");
  if (!wrap) return;
  const tabEls = wrap.querySelectorAll(".tab");
  tabEls.forEach(tabEl => {
    tabEl.addEventListener("pointerdown", onTabPointerDown);
  });
}

function onTabPointerDown(e) {
  // chỉ chuột trái / chạm tay (không xử lý chuột phải)
  if (e.button !== undefined && e.button !== 0) return;
  const tabEl = e.currentTarget;
  const ticketId = Number(tabEl.dataset.ticketId);

  const startX = e.clientX, startY = e.clientY;
  let longPressTimer = setTimeout(() => {
    startTabDrag(tabEl, ticketId, startX, startY);
  }, 280); // nhấn giữ ~0.28s thì bắt đầu kéo, tránh nhầm với việc bấm chọn tab/vuốt cuộn

  function cancelLongPress() {
    clearTimeout(longPressTimer);
    document.removeEventListener("pointermove", onPreDragMove);
    document.removeEventListener("pointerup", cancelLongPress);
    document.removeEventListener("pointercancel", cancelLongPress);
  }
  function onPreDragMove(ev) {
    // nếu ngón tay di chuyển nhiều trước khi đủ thời gian giữ -> coi là vuốt cuộn, huỷ kéo
    const dx = Math.abs(ev.clientX - startX), dy = Math.abs(ev.clientY - startY);
    if (dx > 10 || dy > 10) cancelLongPress();
  }
  document.addEventListener("pointermove", onPreDragMove);
  document.addEventListener("pointerup", cancelLongPress);
  document.addEventListener("pointercancel", cancelLongPress);
}

function startTabDrag(tabEl, ticketId, startX, startY) {
  const wrap = document.getElementById("tabs");
  const rect = tabEl.getBoundingClientRect();

  _dragState = {
    ticketId,
    offsetX: startX - rect.left,
    offsetY: startY - rect.top,
    width: rect.width,
    height: rect.height,
  };

  // Tạo bản sao "đang kéo" nổi trên cùng theo ngón tay
  const ghost = tabEl.cloneNode(true);
  ghost.classList.add("tab-dragging-ghost");
  ghost.style.width = rect.width + "px";
  ghost.style.height = rect.height + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  document.body.appendChild(ghost);
  _dragState.ghost = ghost;

  tabEl.classList.add("tab-drag-source");
  document.body.classList.add("tab-dragging-active");

  document.addEventListener("pointermove", onTabDragMove);
  document.addEventListener("pointerup", onTabDragEnd);
  document.addEventListener("pointercancel", onTabDragEnd);

  // ngăn cuộn trang trong lúc đang kéo tab
  document.addEventListener("touchmove", preventScrollDuringDrag, { passive: false });
}

function preventScrollDuringDrag(e) {
  if (_dragState) e.preventDefault();
}

function onTabDragMove(e) {
  if (!_dragState) return;
  const ghost = _dragState.ghost;
  ghost.style.left = (e.clientX - _dragState.offsetX) + "px";
  ghost.style.top = (e.clientY - _dragState.offsetY) + "px";

  // Tìm tab nào đang bị con trỏ đè lên để đổi vị trí
  const wrap = document.getElementById("tabs");
  const tabEls = Array.from(wrap.querySelectorAll(".tab"));
  const hoveredTab = tabEls.find(el => {
    if (Number(el.dataset.ticketId) === _dragState.ticketId) return false;
    const r = el.getBoundingClientRect();
    return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
  });

  if (hoveredTab) {
    const fromIdx = tickets.findIndex(t => t.id === _dragState.ticketId);
    const toIdx = tickets.findIndex(t => t.id === Number(hoveredTab.dataset.ticketId));
    if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
      const [moved] = tickets.splice(fromIdx, 1);
      tickets.splice(toIdx, 0, moved);
      saveAllSilent();
      renderTabsKeepDrag();
    }
  }
}

// Vẽ lại tabs trong lúc đang kéo nhưng không phá vỡ trạng thái kéo đang chạy
function renderTabsKeepDrag() {
  const wrap = document.getElementById("tabs");
  let html = "";
  tickets.forEach((t, i) => {
    const label = t.customer && t.customer.trim() ? escapeHtml(t.customer.trim()) : ("Phiếu " + (i + 1));
    const activeCls = t.id === activeId ? " active" : "";
    const draggingCls = _dragState && t.id === _dragState.ticketId ? " tab-drag-source" : "";
    html += `<button class="tab${activeCls}${draggingCls}" data-ticket-id="${t.id}" onclick="setActiveTicket(${t.id})">
      <span id="tabLabel_${t.id}">${label}</span>`;
    if (tickets.length > 1) {
      html += `<span class="close" onclick="event.stopPropagation(); closeTicket(${t.id})">✕</span>`;
    }
    html += `</button>`;
  });
  html += `<button class="tab-add" onclick="addTicket()" aria-label="Thêm phiếu mới">+</button>`;
  wrap.innerHTML = html;
  attachTabDragHandlers();
}

function onTabDragEnd() {
  if (!_dragState) return;
  if (_dragState.ghost) _dragState.ghost.remove();
  document.body.classList.remove("tab-dragging-active");
  document.removeEventListener("pointermove", onTabDragMove);
  document.removeEventListener("pointerup", onTabDragEnd);
  document.removeEventListener("pointercancel", onTabDragEnd);
  document.removeEventListener("touchmove", preventScrollDuringDrag);
  _dragState = null;
  saveAll();
  render();
}

// Gộp các dòng cùng tên hàng, tạo chuỗi tóm tắt nhỏ: "Tên hàng: số lượng đơn vị"
// Bảng chi tiết từng dòng hàng trong phiếu: STT, ô tích chọn CK (nếu là ống),
// tên hàng (viết tắt gọn để vừa 1 hàng ngang), số lượng kèm đơn vị, đơn giá,
// thành tiền (đã làm tròn). Mỗi dòng hàng thực tế = đúng 1 dòng trong bảng,
// các cột luôn thẳng hàng với nhau (dùng bảng HTML thật, không phải text nối).
function buildSummaryLine(ticket) {
  const validRows = ticket.rows.filter(row => {
    const name = (row.name || "").trim();
    if (!name) return false;
    return rowQty(row) > 0;
  });
  if (validRows.length === 0) return "";

  // Sắp xếp cố định: Lưới B40 trước -> rồi Đinh/kẽm -> cuối cùng mới tới ống/phụ kiện,
  // để bảng tổng hợp luôn theo đúng thứ tự quen mắt, không phụ thuộc thứ tự nhập tay.
  function rowOrderRank(row) {
    const name = (row.name || "").trim();
    const isLuoi = /\[([^\]]+)\]/.test(name) && !row.isPipe;
    if (isLuoi) return 0; // Lưới B40 (kể cả Kẽm gai [3])
    const isDinhKem = !row.isPipe && /^(Đinh|Kẽm)/.test(name);
    if (isDinhKem) return 1; // Đinh, kẽm
    return 2; // còn lại: ống/phụ kiện
  }
  const sortedRows = [...validRows].sort((a, b) => rowOrderRank(a) - rowOrderRank(b));

  const customerLabel = ticket.customer && ticket.customer.trim() ? ticket.customer.trim() : "";

  let html = `<table class="summary-table">
    <colgroup>
      <col style="width:22px">
      <col style="width:22px">
      <col style="width:30%">
      <col style="width:16%">
      <col style="width:15%">
      <col style="width:auto">
    </colgroup>
    <thead>`;
  if (customerLabel) {
    // Tên khách hàng hiện nhỏ ngay phía trên bảng, đặt ở vùng giữa cột "#"
    // và cột "Tên hàng" (dùng colspan trải đúng 3 cột đầu để căn đúng vị trí).
    html += `<tr class="sc-customer-row">
      <th colspan="3" class="sc-customer-name">${escapeHtml(customerLabel)}</th>
      <th colspan="3"></th>
    </tr>`;
  }
  html += `<tr>
    <th class="sc-stt">#</th>
    <th class="sc-check">✓</th>
    <th class="sc-name">Tên hàng</th>
    <th class="sc-qty">SL</th>
    <th class="sc-price">Đ.giá</th>
    <th class="sc-total">T.tiền</th>
  </tr></thead><tbody>`;
  sortedRows.forEach((row, idx) => {
    const qty = rowQty(row);
    const price = Number(row.price) || 0;
    const lineTotal = roundMoney(qty * price);
    const checkCell = (row.isPipe && row.discountChecked) ? `<span class="sc-check-badge">✓</span>` : "";
    // Với dòng đang cộng nhiều cuộn (lưới), ghi chú thêm số cuộn ngay dưới
    // số kg, để biết rõ đã cân từ mấy cuộn mà không cần mở lại dòng hàng đó.
    const rollNote = (row.mode === "rolls" && row.rolls && row.rolls.length > 0)
      ? `<br><span class="sc-roll-note">${row.rolls.length} cuộn</span>`
      : "";
    html += `<tr>
      <td class="sc-stt">${idx + 1}</td>
      <td class="sc-check">${checkCell}</td>
      <td class="sc-name">${escapeHtml(row.name)}</td>
      <td class="sc-qty">${formatNumber(qty)}${row.unit ? " " + escapeHtml(row.unit) : ""}${rollNote}</td>
      <td class="sc-price">${price > 0 ? formatNumber(price) : ""}</td>
      <td class="sc-total">${lineTotal > 0 ? formatNumber(lineTotal) : ""}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

// Gộp riêng theo độ dày lưới [..] khi đơn giá cũng khớp nhau (ví dụ 1m2 [3] + 1m5 [3] cùng giá).
// Chỉ hiện nhóm nào có từ 2 tên hàng khác nhau trở lên gộp vào, để không lặp lại dòng tổng hợp thường.
function buildThicknessSummaryLine(ticket) {
  const groups = new Map(); // key "doday||giá" -> { thickness, price, qtyList, unit, names:Set }
  ticket.rows.forEach(row => {
    const name = (row.name || "").trim();
    if (!name) return;
    const qty = rowQty(row);
    if (qty <= 0) return;
    const price = Number(row.price) || 0;
    if (price <= 0) return;
    const m = name.match(/\[([^\]]+)\]/); // lấy phần trong dấu [..]
    if (!m) return;
    const thickness = m[1].trim();
    const unit = row.unit || "";
    const key = thickness + "||" + price;
    if (!groups.has(key)) {
      groups.set(key, { thickness, price, qtyList: [], unit, names: new Set() });
    }
    const g = groups.get(key);
    g.qtyList.push(qty);
    g.names.add(name);
  });

  const rows = [];
  groups.forEach(g => {
    if (g.names.size < 2) return; // chỉ hiện khi thực sự gộp từ ≥2 mặt hàng khác nhau
    const total = g.qtyList.reduce((s, v) => s + v, 0);
    const money = roundMoney(total * g.price);
    const sumExpr = g.qtyList.map(v => formatNumber(v)).join(" + ");
    rows.push(
      `<div class="thickness-row">
        <span class="thickness-tag">[${escapeHtml(g.thickness)}]</span>
        <span class="thickness-expr">${sumExpr} = ${formatNumber(total)}${escapeHtml(g.unit)} × ${formatNumber(g.price)} = <b>${formatNumber(money)}đ</b></span>
      </div>`
    );
  });
  if (rows.length === 0) return "";
  return `<div class="thickness-summary-title">Cộng theo độ dày</div>` + rows.join("");
}

// Tổng hợp toàn cục: quét TẤT CẢ các tab (phiếu) đang mở, chỉ tính các dòng
// là lưới (mode "rolls", tên có dạng [..]). Tính tổng số cuộn cần lấy đã điền,
// tổng số cuộn thực tế đã cân, và liệt kê rõ còn thiếu loại nào, bao nhiêu cuộn.
function buildGlobalRollsSummary() {
  const rows = []; // [{ customerLabel, itemName, target, counted, missing, isEnough }]
  // Chỉ tính các loại LƯỚI thật (tên dạng số+m, ví dụ "1m5 [3]", "2m [3]"),
  // KHÔNG tính Kẽm gai hay các mặt hàng khác dù tên cũng có [..].
  const LUOI_PATTERN = /^\d+m[\d,]*\s*\[([^\]]+)\]/i;

  tickets.forEach((t, idx) => {
    const label = t.customer && t.customer.trim() ? t.customer.trim() : `Phiếu ${idx + 1}`;
    t.rows.forEach(row => {
      if (row.mode !== "rolls") return;
      const name = (row.name || "").trim();
      if (!name || !LUOI_PATTERN.test(name)) return; // chỉ tính lưới thật, bỏ qua Kẽm gai...
      const target = Number(row.targetRolls) || 0;
      const counted = row.rolls.length;
      if (target <= 0) return; // chưa đặt mục tiêu thì không có gì để so sánh thiếu/đủ

      const missing = Math.max(0, target - counted);
      const isEnough = counted >= target;

      rows.push({ customerLabel: label, itemName: name, target, counted, missing, isEnough });
    });
  });

  if (rows.length === 0) return "";

  // Dòng tổng kết chung: gộp tất cả khách hàng và mọi cỡ lưới thành 2 số duy nhất.
  const grandTarget = rows.reduce((s, r) => s + r.target, 0);
  const grandMissing = rows.reduce((s, r) => s + r.missing, 0);
  const grandMissingCls = grandMissing > 0 ? "num-missing" : "num-missing enough";

  let html = `<div class="rolls-grand-total">
    <span>Tổng cần lấy: <b>${formatNumber(grandTarget)}</b> cuộn</span>
    <span>Còn thiếu: <b class="${grandMissingCls}">${formatNumber(grandMissing)}</b> cuộn</span>
  </div>`;

  html += `<table class="rolls-status-table"><tbody>`;
  let lastCustomer = null;
  rows.forEach(r => {
    const showCustomer = r.customerLabel !== lastCustomer;
    lastCustomer = r.customerLabel;
    const countedCls = r.isEnough ? "num-counted enough" : "num-counted";
    const missingCls = r.isEnough ? "num-missing enough" : "num-missing";
    html += `<tr>
      <td class="col-customer">${showCustomer ? escapeHtml(r.customerLabel) : ""}</td>
      <td class="col-item">${escapeHtml(r.itemName)}</td>
      <td class="col-num num-target">${formatNumber(r.target)}</td>
      <td class="col-num ${countedCls}">${formatNumber(r.counted)}</td>
      <td class="col-num ${missingCls}">${formatNumber(r.missing)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function render() {
  renderTabs();
  renderSheet();
  // Đảm bảo trang không bao giờ bị kẹt ở trạng thái cuộn lệch ngang,
  // dù có lúc nội dung tạm thời tràn rộng (số liệu dài...).
  resetHorizontalScroll();
}
function resetHorizontalScroll() {
  if (document.documentElement.scrollLeft !== 0) document.documentElement.scrollLeft = 0;
  if (document.body.scrollLeft !== 0) document.body.scrollLeft = 0;
  if (window.scrollX !== 0) window.scrollTo(0, window.scrollY);
}

/* ============ MODAL: DANH SÁCH MẶT HÀNG ============ */
let localItemsDraft = [];
let settingsGroupFilter = "__ALL__"; // "__ALL__" = xem tất cả; tên nhóm cụ thể = chỉ xem nhóm đó

/* ============ SAO LƯU / KHÔI PHỤC DANH BẠ KHÁCH HÀNG ============
   Vì localStorage trên Safari iOS (khi mở file trực tiếp qua file://, không
   qua web server) không được đảm bảo lưu giữ ổn định lâu dài, em thêm tính
   năng này để anh tự sao lưu danh bạ ra 1 đoạn mã, dán lại nếu chẳng may bị
   mất sau khi Safari "dọn dẹp" dữ liệu. */
function openCustomerBackupModal() {
  document.getElementById("modalRoot").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeCustomerBackupModal()">
      <div class="modal">
        <div class="modal-head">
          <h3>Danh bạ khách hàng</h3>
          <button class="modal-close" onclick="closeCustomerBackupModal()">✕</button>
        </div>
        <div class="modal-body">
          <p class="modal-hint">
            ⚠ Lưu ý quan trọng: vì đang mở file trực tiếp (không qua website),
            điện thoại có thể tự xoá danh bạ đã lưu sau một thời gian không dùng.
            Cách chắc chắn nhất là bấm <b>"Tải file về máy"</b> — file này lưu thật
            trong điện thoại, Safari không xoá được. Khi cần khôi phục, bấm
            <b>"Chọn file khôi phục"</b> và chọn lại file đó.
          </p>
          <div class="cb-list">${buildCustomerBackupListHtml()}</div>
          <div class="cb-file-actions">
            <button class="modal-save-btn cb-btn-export" onclick="downloadCustomerBackupFile()">⬇ Tải file về máy</button>
            <button class="modal-save-btn cb-btn-import" onclick="document.getElementById('cbFileInput').click()">📂 Chọn file khôi phục</button>
            <input type="file" id="cbFileInput" accept=".txt,.json" style="display:none" onchange="importCustomerBackupFromFile(this)" />
          </div>
          <p class="modal-hint" style="margin-top:14px">Hoặc dùng đoạn mã (copy/dán vào Ghi chú):</p>
          <textarea id="customerBackupText" class="cb-textarea" rows="3"
            placeholder="Đoạn mã sao lưu sẽ hiện ở đây, hoặc dán đoạn mã cũ vào đây để khôi phục"></textarea>
        </div>
        <div class="modal-foot">
          <div class="cb-actions">
            <button class="modal-save-btn cb-btn-export" onclick="exportCustomerBackup()">Sao lưu</button>
            <button class="modal-save-btn cb-btn-import" onclick="importCustomerBackup()">Khôi phục</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Tải danh bạ thành 1 file .txt thật xuống máy — cách chống mất dữ liệu chắc
// chắn nhất, vì Safari không thể tự xoá file đã tải về (khác với localStorage).
function downloadCustomerBackupFile() {
  if (savedCustomers.length === 0) {
    alert("Chưa có khách hàng nào để sao lưu.");
    return;
  }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(savedCustomers))));
  const blob = new Blob([encoded], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date();
  const dateStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
  a.href = url;
  a.download = `danhba_khach_hang_${dateStr}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  try { localStorage.setItem("tinnghia_lastbackup_v1", String(Date.now())); } catch (e) {}
}

// Đọc lại file .txt đã tải về trước đó, gộp thêm vào danh bạ hiện tại.
function importCustomerBackupFromFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const code = String(e.target.result).trim();
      const decoded = decodeURIComponent(escape(atob(code)));
      const names = JSON.parse(decoded);
      if (!Array.isArray(names)) throw new Error("Sai định dạng");
      let addedCount = 0;
      names.forEach(n => {
        if (typeof n !== "string") return;
        const exists = savedCustomers.some(s => s.toLowerCase() === n.toLowerCase());
        if (!exists) {
          savedCustomers.push(n);
          addedCount++;
        }
      });
      savedCustomers.sort((a, b) => a.localeCompare(b, "vi"));
      try { localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(savedCustomers)); } catch (err) {}
      alert(`Đã khôi phục thêm ${addedCount} khách hàng mới từ file.`);
      openCustomerBackupModal();
    } catch (err) {
      alert("File không đúng định dạng sao lưu. Vui lòng chọn đúng file đã tải về trước đó.");
    }
  };
  reader.readAsText(file);
  input.value = "";
}

function closeCustomerBackupModal() {
  document.getElementById("modalRoot").innerHTML = "";
}

function buildCustomerBackupListHtml() {
  if (savedCustomers.length === 0) {
    return `<p class="modal-empty">Chưa có khách hàng nào được lưu.</p>`;
  }
  return `<p class="cb-count">Đang có ${savedCustomers.length} khách hàng đã lưu: ${savedCustomers.map(escapeHtml).join(", ")}</p>`;
}

// Xuất danh bạ thành 1 đoạn mã (base64 của JSON), hiện trong ô để anh copy
// thủ công đi lưu chỗ khác an toàn hơn (Notes, Ghi chú...).
function exportCustomerBackup() {
  const textarea = document.getElementById("customerBackupText");
  if (!textarea) return;
  if (savedCustomers.length === 0) {
    alert("Chưa có khách hàng nào để sao lưu.");
    return;
  }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(savedCustomers))));
  textarea.value = encoded;
  textarea.select();
  try { localStorage.setItem("tinnghia_lastbackup_v1", String(Date.now())); } catch (e) {}
}

// Dán đoạn mã cũ vào ô rồi bấm Khôi phục để nạp lại danh bạ, gộp thêm vào
// danh bạ hiện tại (không xoá mất tên nào đang có).
function importCustomerBackup() {
  const textarea = document.getElementById("customerBackupText");
  if (!textarea) return;
  const code = textarea.value.trim();
  if (!code) {
    alert("Anh dán đoạn mã sao lưu vào ô trước khi bấm Khôi phục.");
    return;
  }
  try {
    const decoded = decodeURIComponent(escape(atob(code)));
    const names = JSON.parse(decoded);
    if (!Array.isArray(names)) throw new Error("Sai định dạng");
    let addedCount = 0;
    names.forEach(n => {
      if (typeof n !== "string") return;
      const exists = savedCustomers.some(s => s.toLowerCase() === n.toLowerCase());
      if (!exists) {
        savedCustomers.push(n);
        addedCount++;
      }
    });
    savedCustomers.sort((a, b) => a.localeCompare(b, "vi"));
    try { localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(savedCustomers)); } catch (e) {}
    alert(`Đã khôi phục thêm ${addedCount} khách hàng mới (giữ nguyên các tên đang có).`);
    openCustomerBackupModal(); // vẽ lại modal để cập nhật danh sách mới
  } catch (e) {
    alert("Đoạn mã không đúng, anh kiểm tra lại đã dán đủ và đúng đoạn mã chưa.");
  }
}

function openItemEditor() {
  localItemsDraft = items.map(i => ({...i}));
  settingsGroupFilter = "__ALL__";
  renderItemModal();
}
function closeItemEditor() {
  document.getElementById("modalRoot").innerHTML = "";
}
function saveItemEditor() {
  items = localItemsDraft.filter(i => i.name.trim() !== "");
  saveAll();
  closeItemEditor();
  render();
}
function draftUpdateItem(idx, patch) {
  Object.assign(localItemsDraft[idx], patch);
}
function draftRemoveItem(idx) {
  localItemsDraft.splice(idx, 1);
  renderItemModal();
}
function draftAddItem() {
  const nameEl = document.getElementById("newItemName");
  const unitEl = document.getElementById("newItemUnit");
  const name = nameEl.value.trim();
  if (!name) return;
  // Thêm mặt hàng mới vào đúng nhóm đang xem (nếu đang lọc theo 1 nhóm cụ thể),
  // để không cần chọn lại nhóm sau khi thêm.
  const newItem = { name, unit: unitEl.value };
  if (settingsGroupFilter !== "__ALL__") newItem.group = settingsGroupFilter;
  localItemsDraft.push(newItem);
  nameEl.value = "";
  renderItemModal();
}

function onSettingsGroupFilterChange(value) {
  settingsGroupFilter = value;
  renderItemModal();
}

function buildSettingsGroupOptionsHtml() {
  const groupNames = [...new Set(localItemsDraft.filter(it => it.group).map(it => it.group))];
  const ungroupedCount = localItemsDraft.filter(it => !it.group).length;
  let opts = `<option value="__ALL__" ${settingsGroupFilter === "__ALL__" ? "selected" : ""}>Tất cả (${localItemsDraft.length})</option>`;
  if (ungroupedCount > 0) {
    opts += `<option value="__NONE__" ${settingsGroupFilter === "__NONE__" ? "selected" : ""}>Không thuộc nhóm (${ungroupedCount})</option>`;
  }
  groupNames.forEach(g => {
    const count = localItemsDraft.filter(it => it.group === g).length;
    opts += `<option value="${escapeHtml(g)}" ${settingsGroupFilter === g ? "selected" : ""}>${escapeHtml(g)} (${count})</option>`;
  });
  return opts;
}

function getFilteredIndices() {
  // Trả về danh sách index GỐC (trong localItemsDraft) của các mặt hàng đang
  // hiện theo bộ lọc nhóm, để sắp xếp/sửa/xoá luôn đúng đối tượng gốc.
  return localItemsDraft
    .map((it, idx) => ({ it, idx }))
    .filter(({ it }) => {
      if (settingsGroupFilter === "__ALL__") return true;
      if (settingsGroupFilter === "__NONE__") return !it.group;
      return it.group === settingsGroupFilter;
    })
    .map(({ idx }) => idx);
}

/* ============ KÉO-THẢ SẮP XẾP THỨ TỰ MẶT HÀNG (nhấn giữ tay nắm rồi kéo) ============ */
let _itemDragState = null;

function attachItemDragHandlers() {
  const body = document.querySelector(".modal-body");
  if (!body) return;
  body.querySelectorAll(".drag-handle").forEach(handle => {
    handle.addEventListener("pointerdown", onItemHandlePointerDown);
  });
}

function onItemHandlePointerDown(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  const rowEl = e.currentTarget.closest(".item-row");
  const startIndex = Number(rowEl.dataset.itemIndex);
  startItemDrag(rowEl, startIndex, e.clientX, e.clientY);
}

function startItemDrag(rowEl, index, startX, startY) {
  const rect = rowEl.getBoundingClientRect();
  _itemDragState = {
    index,
    offsetX: startX - rect.left,
    offsetY: startY - rect.top,
  };

  const ghost = rowEl.cloneNode(true);
  ghost.classList.add("item-dragging-ghost");
  ghost.style.width = rect.width + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  document.body.appendChild(ghost);
  _itemDragState.ghost = ghost;

  rowEl.classList.add("item-drag-source");

  document.addEventListener("pointermove", onItemDragMove);
  document.addEventListener("pointerup", onItemDragEnd);
  document.addEventListener("pointercancel", onItemDragEnd);
  document.addEventListener("touchmove", preventScrollDuringItemDrag, { passive: false });
}

function preventScrollDuringItemDrag(e) {
  if (_itemDragState) e.preventDefault();
}

function onItemDragMove(e) {
  if (!_itemDragState) return;
  const ghost = _itemDragState.ghost;
  ghost.style.left = (e.clientX - _itemDragState.offsetX) + "px";
  ghost.style.top = (e.clientY - _itemDragState.offsetY) + "px";

  const body = document.querySelector(".modal-body");
  if (!body) return;
  const rowEls = Array.from(body.querySelectorAll(".item-row"));
  const hoveredRow = rowEls.find(el => {
    const r = el.getBoundingClientRect();
    return e.clientY >= r.top && e.clientY <= r.bottom;
  });

  if (hoveredRow) {
    const toIndex = Number(hoveredRow.dataset.itemIndex);
    if (toIndex !== _itemDragState.index) {
      const [moved] = localItemsDraft.splice(_itemDragState.index, 1);
      localItemsDraft.splice(toIndex, 0, moved);
      _itemDragState.index = toIndex;
      renderItemModalKeepDrag();
    }
  }
}

// Vẽ lại danh sách trong lúc đang kéo nhưng không phá vỡ trạng thái kéo đang chạy.
// Chỉ vẽ các mặt hàng thuộc nhóm đang lọc, nhưng vẫn dùng đúng index gốc.
function renderItemModalKeepDrag() {
  const body = document.querySelector(".modal-body");
  if (!body) return;
  let unitOptsTemplate = (selected) => {
    let o = "";
    UNITS.forEach(u => { o += `<option value="${u}" ${u===selected?"selected":""}>${u}</option>`; });
    return o;
  };
  const filteredIndices = getFilteredIndices();
  let rowsHtml = "";
  filteredIndices.forEach(idx => {
    const it = localItemsDraft[idx];
    const dragCls = _itemDragState && idx === _itemDragState.index ? " item-drag-source" : "";
    rowsHtml += `
      <div class="item-row${dragCls}" data-item-index="${idx}">
        <span class="drag-handle">⠿</span>
        <input type="text" value="${escapeHtml(it.name)}"
          oninput="draftUpdateItem(${idx}, {name: this.value})" />
        <select onchange="draftUpdateItem(${idx}, {unit: this.value})">${unitOptsTemplate(it.unit)}</select>
        <button class="del" onclick="draftRemoveItem(${idx})">🗑</button>
      </div>`;
  });
  // giữ lại phần hint + bộ lọc nhóm phía trên, chỉ thay phần danh sách
  const hint = body.querySelector(".modal-hint");
  const filterRow = body.querySelector(".settings-group-filter");
  body.innerHTML = (filterRow ? filterRow.outerHTML : "") + (hint ? hint.outerHTML : "") + rowsHtml;
  attachItemDragHandlers();
}

function onItemDragEnd() {
  if (!_itemDragState) return;
  if (_itemDragState.ghost) _itemDragState.ghost.remove();
  document.removeEventListener("pointermove", onItemDragMove);
  document.removeEventListener("pointerup", onItemDragEnd);
  document.removeEventListener("pointercancel", onItemDragEnd);
  document.removeEventListener("touchmove", preventScrollDuringItemDrag);
  _itemDragState = null;
  renderItemModal();
}

function renderItemModal() {
  let unitOptsTemplate = (selected) => {
    let o = "";
    UNITS.forEach(u => { o += `<option value="${u}" ${u===selected?"selected":""}>${u}</option>`; });
    return o;
  };

  const filteredIndices = getFilteredIndices();
  let rowsHtml = "";
  if (filteredIndices.length === 0) {
    rowsHtml = `<p class="modal-empty">Không có mặt hàng nào trong nhóm này.</p>`;
  } else {
    filteredIndices.forEach(idx => {
      const it = localItemsDraft[idx];
      rowsHtml += `
        <div class="item-row" data-item-index="${idx}">
          <span class="drag-handle">⠿</span>
          <input type="text" value="${escapeHtml(it.name)}"
            oninput="draftUpdateItem(${idx}, {name: this.value})" />
          <select onchange="draftUpdateItem(${idx}, {unit: this.value})">${unitOptsTemplate(it.unit)}</select>
          <button class="del" onclick="draftRemoveItem(${idx})">🗑</button>
        </div>`;
    });
  }

  document.getElementById("modalRoot").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeItemEditor()">
      <div class="modal">
        <div class="modal-head">
          <h3>Danh sách mặt hàng</h3>
          <button class="modal-close" onclick="closeItemEditor()">✕</button>
        </div>
        <div class="modal-body">
          <div class="settings-group-filter">
            <label>Xem theo nhóm:</label>
            <select onchange="onSettingsGroupFilterChange(this.value)">${buildSettingsGroupOptionsHtml()}</select>
          </div>
          <p class="modal-hint">Gợi ý: đặt tên ngắn gọn kiểu "1m5 [3]" (chiều cao [độ dày]) để chọn nhanh và không nhầm đơn giá. Nhấn giữ vào ⠿ rồi kéo để đổi thứ tự ưu tiên trong nhóm.</p>
          ${rowsHtml}
        </div>
        <div class="modal-foot">
          <div class="item-row">
            <input type="text" id="newItemName" placeholder="Tên mặt hàng mới" />
            <select id="newItemUnit">${unitOptsTemplate(UNITS[0])}</select>
            <button class="roll-add-btn" onclick="draftAddItem()">+</button>
          </div>
          <button class="modal-save-btn" onclick="saveItemEditor()">Lưu danh sách</button>
        </div>
      </div>
    </div>
  `;
  attachItemDragHandlers();
}

/* ============ KHỞI ĐỘNG ============ */
loadAll();
render();
flashSavedNote();
checkBackupReminder();

// Nhắc nhở sao lưu danh bạ nếu đã >7 ngày chưa sao lưu lần nào, để giảm rủi ro
// mất dữ liệu khi Safari tự dọn localStorage của file mở qua file://.
const BACKUP_REMINDER_KEY = "tinnghia_lastbackup_v1";
function checkBackupReminder() {
  if (savedCustomers.length === 0) return; // chưa có gì để nhắc sao lưu
  let lastBackup = 0;
  try { lastBackup = Number(localStorage.getItem(BACKUP_REMINDER_KEY)) || 0; } catch (e) {}
  const daysSince = (Date.now() - lastBackup) / (1000 * 60 * 60 * 24);
  if (lastBackup === 0 || daysSince > 7) {
    setTimeout(() => {
      const el = document.getElementById("backupReminderBanner");
      if (el) el.style.display = "flex";
    }, 600);
  }
}
function dismissBackupReminder() {
  const el = document.getElementById("backupReminderBanner");
  if (el) el.style.display = "none";
}
function goToBackupFromReminder() {
  dismissBackupReminder();
  openCustomerBackupModal();
}
</script>
